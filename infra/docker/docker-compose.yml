version: "3.9"

name: ScholarOS-local

services:
  chroma:
    image: chromadb/chroma:0.5.23
    container_name: ScholarOS-chroma
    restart: unless-stopped
    ports:
      - "${CHROMA_PORT:-8001}:8000"
    volumes:
      - ../../.local/chroma:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"

  redis:
    image: redis:7-alpine
    container_name: ScholarOS-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ../../.local/redis:/data

  ollama:
    image: ollama/ollama:0.6.0
    container_name: ScholarOS-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ../../.local/ollama:/root/.ollama

# SQLite metadata and JSON trace files are host-local resources configured
# through .env and do not require dedicated containers.
